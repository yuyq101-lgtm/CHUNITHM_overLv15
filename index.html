// ジャンル名に応じたカラーコードを返す関数
function getGenreColor(genre) {
    switch (genre) {
        case "ORIGINAL": return "#ff6b6b"; // みやすい赤系
        case "ゲキマイ": return "#ffd32a"; // みやすい黄色系
        case "イロトリミドリ": return "#f3d3b0"; // みやすいベージュ系
        case "VARIETY": return "#7bed9f"; // みやすい緑系
        case "東方Project": return "#70a1ff"; // みやすい水色系
        case "niconico": return "#c56cf0"; // みやすい紫系
        case "POPS＆ANIME": return "#ff9ff3"; // みやすいピンク系
        default: return "#888888"; // 未設定の場合のグレー
    }
}

// 長い曲名だけを「うまいこと」改行する処理
function formatLongName(name) {
    if (name.length < 16) return name;
    if (name.includes(" -")) return name.replace(" -", "<br>-");
    if (name.includes("～")) return name.replace("～", "<br>～");
    if (name.includes(" (")) return name.replace(" (", "<br>(");
    if (name.includes("「")) return name.replace("「", "<br>「");
    return name; 
}

function rollGacha() {
    // 登録した曲の中からガチの一発抽選！
    const randIdx = Math.floor(Math.random() * songs.length);
    const luckySong = songs[randIdx];
    
    // 表示用の綺麗な曲名を作る
    const displayName = formatLongName(luckySong.name);
    
    // ジャンルに応じた文字色を取得
    const genreColor = getGenreColor(luckySong.genre);
    
    // 画面の書き換え
    const resultBox = document.getElementById("result-content");
    resultBox.innerHTML = `
        <div class="title-line">========== チュウニズム 15以上確定ガチャ (全${songs.length}曲) ==========</div>
        <div style="font-size: 1rem; color: #aaa; margin-bottom: 10px;">選ばれた楽曲はこちらです</div>
        <div class="genre-line" style="color: ${genreColor};">【ジャンル: ${luckySong.genre}】</div>
        <div class="song-name">【 ${displayName} 】<br><br>(譜面定数: ${luckySong.constant.toFixed(1)})</div>
        <div style="font-size: 0.9rem; color: #888; margin-top: 15px;">=========================================================</div>
    `;
}
